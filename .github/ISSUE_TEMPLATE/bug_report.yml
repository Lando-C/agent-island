name: Bug report
description: Report a reproducible Agent Island bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Codex App
        - Codex CLI
        - Claude App
        - Claude Code CLI
        - Claude Science
        - ChatGPT App
        - ChatGPT Web
        - Terminal/tmux jump
        - Settings/Diagnostics
        - Other
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste a redacted diagnostics report if safe.
      render: text
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "14.6"
  - type: input
    id: version
    attributes:
      label: Agent Island version or commit
