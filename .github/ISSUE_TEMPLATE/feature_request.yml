name: Feature request
description: Propose a focused product improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow is blocked or slow?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Agent Island do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - State accuracy
        - Approval/question workflow
        - Terminal/app/browser jump
        - Chat/tool details
        - Diagnostics/install
        - Off-island/mascot/sound
        - Release/package
        - Other
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Links, screenshots, or comparable implementations.
