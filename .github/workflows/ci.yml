name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build and validate
    runs-on: macos-14
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Swift build
        run: swift build

      - name: Swift production tests
        run: scripts/test-swift

      - name: Python syntax
        run: python3 -m py_compile scripts/agent-island-bridge.py scripts/codex-broker-probe scripts/validate-codex-broker-probe

      - name: Shell syntax
        run: bash -n scripts/agent-island-diagnostics scripts/build-app scripts/install scripts/install-hooks scripts/agent-island-event scripts/test-swift

      - name: Installer command surface
        run: |
          scripts/install --help
          scripts/install-hooks --help

      - name: Reducer validation
        run: scripts/validate-session-reducer

      - name: Expansion validation
        run: scripts/validate-expansion-controller

      - name: Codex broker probe validation
        run: scripts/validate-codex-broker-probe
