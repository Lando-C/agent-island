name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
      prerelease:
        description: Publish as a public preview release
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  package:
    name: Package macOS app
    runs-on: macos-14
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]

      - name: Swift production tests
        run: scripts/test-swift

      - name: Reducer and interaction validation
        run: |
          scripts/validate-session-reducer
          scripts/validate-expansion-controller
          scripts/validate-codex-broker-probe

      - name: Prepare stable signing identity
        if: ${{ !inputs.prerelease }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          [[ -n "$CERTIFICATE_BASE64" && -n "$CERTIFICATE_PASSWORD" ]]
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/agent-island.keychain-db"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n 1)"
          [[ -n "$IDENTITY" ]]
          echo "AGENT_ISLAND_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Prepare App Store Connect key
        if: ${{ !inputs.prerelease }}
        env:
          NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          [[ -n "$NOTARY_KEY_BASE64" && -n "$NOTARY_KEY_ID" && -n "$NOTARY_ISSUER_ID" ]]
          KEY_PATH="$RUNNER_TEMP/AuthKey_${NOTARY_KEY_ID}.p8"
          echo "$NOTARY_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "AGENT_ISLAND_NOTARY_KEY_FILE=$KEY_PATH" >> "$GITHUB_ENV"
          echo "AGENT_ISLAND_NOTARY_KEY_ID=$NOTARY_KEY_ID" >> "$GITHUB_ENV"
          echo "AGENT_ISLAND_NOTARY_ISSUER_ID=$NOTARY_ISSUER_ID" >> "$GITHUB_ENV"

      - name: Build app bundle
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          AGENT_ISLAND_BUILD_NUMBER: ${{ github.run_number }}
          AGENT_ISLAND_UNIVERSAL: "1"
        run: |
          export AGENT_ISLAND_VERSION="${RELEASE_TAG#v}"
          scripts/build-app

      - name: Notarize stable release
        if: ${{ !inputs.prerelease }}
        run: scripts/notarize-app

      - name: Create zip
        if: ${{ inputs.prerelease }}
        run: |
          cd dist
          ditto -c -k --keepParent "Agent Island.app" "Agent-Island-macOS.zip"
          shasum -a 256 "Agent-Island-macOS.zip" > SHA256SUMS

      - name: Render Homebrew Cask for stable release
        if: ${{ !inputs.prerelease }}
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          SHA="$(awk '{print $1}' dist/SHA256SUMS)"
          scripts/update-homebrew-cask "${RELEASE_TAG#v}" "$SHA"
          cp Casks/agent-island.rb dist/agent-island.rb

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Agent-Island-macOS
          path: |
            dist/Agent-Island-macOS.zip
            dist/SHA256SUMS
            dist/agent-island.rb

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          args=(
            "$RELEASE_TAG"
            "dist/Agent-Island-macOS.zip"
            "dist/SHA256SUMS"
            --title "Agent Island $RELEASE_TAG"
            --generate-notes
            --notes "macOS 13+ release. Stable releases are Developer ID signed, notarized, and stapled; previews remain explicitly marked as previews. See the README for Hook and permission setup."
          )
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              dist/Agent-Island-macOS.zip dist/SHA256SUMS --clobber
          else
            gh release create "${args[@]}"
          fi
