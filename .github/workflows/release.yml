name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
      prerelease:
        description: Publish as a public preview release
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  package:
    name: Package macOS app
    runs-on: macos-14
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]

      - name: Swift production tests
        run: scripts/test-swift

      - name: Reducer and interaction validation
        run: |
          scripts/validate-session-reducer
          scripts/validate-expansion-controller
          scripts/validate-codex-broker-probe

      - name: Build app bundle
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          AGENT_ISLAND_BUILD_NUMBER: ${{ github.run_number }}
          AGENT_ISLAND_UNIVERSAL: "1"
        run: |
          export AGENT_ISLAND_VERSION="${RELEASE_TAG#v}"
          scripts/build-app

      - name: Create zip
        run: |
          cd dist
          ditto -c -k --keepParent "Agent Island.app" "Agent-Island-macOS.zip"
          shasum -a 256 "Agent-Island-macOS.zip" > SHA256SUMS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Agent-Island-macOS
          path: |
            dist/Agent-Island-macOS.zip
            dist/SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          args=(
            "$RELEASE_TAG"
            "dist/Agent-Island-macOS.zip"
            "dist/SHA256SUMS"
            --title "Agent Island $RELEASE_TAG"
            --generate-notes
            --notes "Developer preview for macOS 13+. This build is not Apple-notarized yet; see the README for first-open and permission instructions."
          )
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              dist/Agent-Island-macOS.zip dist/SHA256SUMS --clobber
          else
            gh release create "${args[@]}"
          fi
